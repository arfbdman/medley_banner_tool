<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バナープロンプトメーカー — Medley PMAX</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root{--teal:#41C2BE;--teal-dark:#2BA8A4;--pink:#FF4F7E;--navy:#0E1E3D;--navy2:#162845;--surface:#F4F7FB;--card:#FFFFFF;--border:#E2E8F0;--text:#1A2340;--muted:#6B7A99;--tag:#EBF8F8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text);min-height:100vh}
  header{background:var(--navy);padding:0 32px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
  .logo-mark{width:28px;height:28px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px}
  .logo-text{color:#fff;font-weight:700;font-size:15px}
  .logo-sub{color:var(--teal);font-size:11px;opacity:.8;margin-left:4px}
  header nav{margin-left:auto;display:flex;gap:8px}
  .step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .2s}
  .step-dot.active{background:var(--teal);color:#fff}
  .step-dot.done{background:var(--teal-dark);color:#fff}
  .step-dot.idle{background:rgba(255,255,255,.12);color:rgba(255,255,255,.4)}
  .screen{display:none}.screen.active{display:block}
  /* BROWSE */
  .browse-layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 56px)}
  .sidebar{background:var(--navy2);padding:20px 12px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
  .sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
  .sidebar-title{color:rgba(255,255,255,.35);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:0 8px 10px}
  .shoku-btn{width:100%;text-align:left;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.6);font-family:'Noto Sans JP',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
  .shoku-btn:hover{background:rgba(255,255,255,.07);color:#fff}
  .shoku-btn.active{background:var(--teal);color:#fff;font-weight:700}
  .shoku-count{background:rgba(255,255,255,.15);border-radius:10px;font-size:11px;padding:1px 7px}
  .shoku-btn.active .shoku-count{background:rgba(255,255,255,.25)}
  .browse-main{padding:24px 28px}
  .browse-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
  .browse-title{font-size:20px;font-weight:900;color:var(--navy)}
  .browse-count{color:var(--muted);font-size:13px}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .chip{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--muted);font-family:'Noto Sans JP',sans-serif}
  .chip:hover{border-color:var(--teal);color:var(--teal)}
  .chip.active{background:var(--teal);border-color:var(--teal);color:#fff}
  .template-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:14px}
  .tcard{background:var(--card);border-radius:14px;border:2px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
  .tcard:hover{border-color:var(--teal);transform:translateY(-2px);box-shadow:0 6px 20px rgba(65,194,190,.16)}
  .tcard.selected{border-color:var(--teal);box-shadow:0 0 0 3px rgba(65,194,190,.22)}
  .tcard-check{position:absolute;top:8px;right:8px;width:22px;height:22px;background:var(--teal);border-radius:50%;display:none;align-items:center;justify-content:center;color:#fff;font-size:12px;z-index:2}
  .tcard.selected .tcard-check{display:flex}
  .tcard-img{width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,#EBF8F8,#E8F4FF);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .tcard-img img{width:100%;height:100%;object-fit:cover;display:block}
  .img-placeholder{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);font-size:11px;position:absolute;inset:0;justify-content:center}
  .vtype-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px}
  .color-dot{position:absolute;top:6px;left:6px;width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.6)}
  .tcard-body{padding:9px 12px 11px}
  .tcard-shoku{font-size:10px;color:var(--teal-dark);font-weight:700;margin-bottom:2px}
  .tcard-copy{font-size:12px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px}
  .cta-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700}
  .cta-app{background:#FFF0F5;color:var(--pink)}.cta-reg{background:var(--tag);color:var(--teal-dark)}
  .selection-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:13px 22px;border-radius:16px;display:flex;align-items:center;gap:18px;box-shadow:0 8px 32px rgba(0,0,0,.3);z-index:50;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap}
  .selection-bar.visible{opacity:1;pointer-events:all}
  .sel-info{font-size:13px;font-weight:500}
  .sel-info strong{color:var(--teal)}
  .btn-next{background:var(--teal);color:#fff;border:none;padding:9px 20px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
  .btn-next:hover{background:var(--teal-dark)}
  .btn-clear{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);border:none;padding:7px 13px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
  .btn-clear:hover{background:rgba(255,255,255,.18)}
  /* FORM */
  .form-screen{max-width:720px;margin:0 auto;padding:36px 24px 80px}
  .form-back{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:24px;background:none;border:none;font-family:'Noto Sans JP',sans-serif}
  .form-back:hover{color:var(--text)}
  .selected-cards{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap}
  .sel-thumb{width:88px;border-radius:10px;overflow:hidden;border:2px solid var(--teal)}
  .sel-thumb img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--tag)}
  .sel-thumb-label{background:var(--navy);color:#fff;font-size:9px;padding:3px 6px;text-align:center;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .form-section{background:#fff;border-radius:16px;padding:26px;margin-bottom:14px;border:1px solid var(--border)}
  .form-section h3{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:18px}
  .form-row{margin-bottom:16px}
  .form-label{display:block;font-size:13px;font-weight:600;margin-bottom:7px;color:var(--text)}
  .form-label span{color:var(--pink);margin-left:3px}
  select,input[type=text]{width:100%;padding:10px 13px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--surface);appearance:none;outline:none;transition:border-color .15s}
  select:focus,input[type=text]:focus{border-color:var(--teal);background:#fff}
  .cta-toggle{display:flex;gap:10px}
  .cta-option{flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);text-align:center;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;color:var(--muted);background:var(--surface);user-select:none}
  .cta-option:hover{border-color:var(--teal)}
  .cta-option.active{border-color:var(--teal);background:var(--tag);color:var(--teal-dark)}
  .btn-generate{width:100%;padding:15px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-top:8px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
  .btn-generate:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(65,194,190,.32)}
  /* PROMPT */
  .prompt-screen{max-width:820px;margin:0 auto;padding:36px 24px 80px}
  .prompt-title{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:24px}
  .prompt-cards{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
  .prompt-ref{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:6px 12px 6px 6px;font-size:12px;color:var(--muted)}
  .prompt-ref img{width:36px;height:36px;border-radius:6px;object-fit:cover;background:var(--tag)}
  .prompt-ref strong{color:var(--text);font-weight:700}
  /* TWO PROMPT BOXES */
  .prompt-boxes{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .prompt-box{background:var(--navy);border-radius:16px;overflow:hidden}
  .prompt-box.combined{grid-column:1/-1}
  .prompt-box-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  .prompt-box-title{color:var(--teal);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'DM Mono',monospace}
  .prompt-box-title.pink{color:var(--pink)}
  .prompt-box-title.gold{color:#F4D66D}
  .btn-copy{background:rgba(65,194,190,.15);border:1px solid rgba(65,194,190,.3);color:var(--teal);padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
  .btn-copy:hover{background:rgba(65,194,190,.25)}
  .btn-copy.copied{background:rgba(65,194,190,.3);color:#fff}
  .prompt-content{padding:16px 18px;font-family:'DM Mono',monospace;font-size:12px;line-height:1.8;color:rgba(255,255,255,.82);white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto}
  .prompt-content.tall{max-height:420px}
  .prompt-content::-webkit-scrollbar{width:4px}.prompt-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
  .pk{color:var(--teal);font-weight:500}
  .pk-pink{color:var(--pink);font-weight:500}
  .pk-gold{color:#F4D66D;font-weight:500}
  .btn-copyall{width:100%;padding:13px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border:2px solid rgba(65,194,190,.4);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-copyall:hover{border-color:var(--teal);background:rgba(65,194,190,.08)}
  .btn-restart{background:#fff;color:var(--navy);border:2px solid var(--border);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;width:100%}
  .btn-restart:hover{border-color:var(--teal);color:var(--teal)}
  /* img auth notice */
  .img-notice{background:#FFF8E6;border:1px solid #F7D070;border-radius:10px;padding:10px 16px;font-size:12px;color:#7A5800;margin-bottom:20px;display:flex;align-items:center;gap:8px}
</style>
</head>
<body>
<header>
  <div class="logo-mark">M</div>
  <span class="logo-text">バナープロンプトメーカー</span>
  <span class="logo-sub">Medley PMAX</span>
  <nav>
    <div class="step-dot active" id="dot1">1</div>
    <div class="step-dot idle" id="dot2">2</div>
    <div class="step-dot idle" id="dot3">3</div>
  </nav>
</header>

<!-- SCREEN 1 -->
<div class="screen active" id="screen1">
  <div class="browse-layout">
    <aside class="sidebar">
      <div class="sidebar-title">職種</div>
      <div id="shoku-list"></div>
    </aside>
    <main class="browse-main">
      <div class="img-notice">🔐 画像はCyberAgentアカウントでGoogleにログイン中のブラウザでのみ表示されます</div>
      <div class="browse-header">
        <h1 class="browse-title" id="browse-title">全テンプレート</h1>
        <span class="browse-count" id="browse-count"></span>
      </div>
      <div class="filter-row">
        <button class="chip active" data-vtype="all">すべて</button>
        <button class="chip" data-vtype="実写">📷 実写</button>
        <button class="chip" data-vtype="イラスト">✏️ イラスト</button>
        <button class="chip" data-vtype="テキストのみ">🔤 テキスト</button>
        <button class="chip" data-vtype="UI">🖥 UI</button>
      </div>
      <div class="template-grid" id="template-grid"></div>
    </main>
  </div>
  <div class="selection-bar" id="selection-bar">
    <span class="sel-info">参照: <strong id="sel-count">0</strong>/2 選択中</span>
    <button class="btn-clear" onclick="clearSel()">クリア</button>
    <button class="btn-next" onclick="goForm()">フォームへ →</button>
  </div>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="screen2">
  <div class="form-screen">
    <button class="form-back" onclick="goBack(2)">← テンプレート選択に戻る</button>
    <div class="selected-cards" id="sel-preview"></div>
    <div class="form-section">
      <h3>バナー設定</h3>
      <div class="form-row">
        <label class="form-label">職種<span>*</span></label>
        <select id="f-shoku">
          <option value="">選択してください</option>
          <option>ケアマネジャー</option><option>医師</option><option>介護職</option>
          <option>介護職-ヘルパ</option><option>看護師</option><option>歯科医師</option>
          <option>歯科衛生士</option><option>児童指導員</option><option>生活支援員</option>
          <option>年収診断</option><option>汎用</option><option>保育士</option>
          <option>薬剤師</option><option>理学療法士</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">訴求コピー<span>*</span></label>
        <input type="text" id="f-copy" placeholder="例：月給35万円以上可、残業ほぼなし" />
      </div>
      <div class="form-row">
        <label class="form-label">CTA<span>*</span></label>
        <div class="cta-toggle">
          <div class="cta-option active" id="cta-app" onclick="setCTA('app')">今すぐ応募</div>
          <div class="cta-option" id="cta-reg" onclick="setCTA('reg')">今すぐ登録</div>
        </div>
      </div>
    </div>
    <button class="btn-generate" onclick="generate()">✨ プロンプトを生成する</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="screen3">
  <div class="prompt-screen">
    <button class="form-back" onclick="goBack(3)">← フォームに戻る</button>
    <h1 class="prompt-title">生成されたプロンプト</h1>
    <div class="prompt-cards" id="prompt-refs"></div>

    <div class="prompt-boxes">
      <!-- Box A -->
      <div class="prompt-box" id="box-a">
        <div class="prompt-box-header">
          <span class="prompt-box-title">参照バナー A</span>
          <button class="btn-copy" onclick="copyBox('a')">📋 コピー</button>
        </div>
        <div class="prompt-content" id="out-a"></div>
      </div>
      <!-- Box B -->
      <div class="prompt-box" id="box-b">
        <div class="prompt-box-header">
          <span class="prompt-box-title pink">参照バナー B</span>
          <button class="btn-copy" onclick="copyBox('b')">📋 コピー</button>
        </div>
        <div class="prompt-content" id="out-b"></div>
      </div>
      <!-- Combined -->
      <div class="prompt-box combined">
        <div class="prompt-box-header">
          <span class="prompt-box-title gold">✦ 統合プロンプト（2×2コンセプトボード）</span>
          <button class="btn-copy" onclick="copyBox('combined')">📋 コピー</button>
        </div>
        <div class="prompt-content tall" id="out-combined"></div>
      </div>
    </div>

    <button class="btn-copyall" onclick="copyAll()">📋 すべてのプロンプトをまとめてコピー</button>
    <button class="btn-restart" onclick="restart()">🔄 最初からやり直す</button>
  </div>
</div>

function iurl(f){const id=DRIVE_IDS[f];return id?`https://lh3.googleusercontent.com/d/${id}`:null}

let selShoku=null,selVtype="all",sel=[],fCTA="app";
let prompts={a:"",b:"",combined:""};

function init(){
  const list=document.getElementById('shoku-list');
  const allBtn=document.createElement('button');allBtn.className='shoku-btn active';allBtn.dataset.shoku='';
  allBtn.innerHTML=`<span>すべて</span><span class="shoku-count">${T.length}</span>`;
  allBtn.onclick=()=>pickShoku('');list.appendChild(allBtn);
  SHOKUS.forEach(s=>{
    const cnt=T.filter(t=>t.s===s).length;const b=document.createElement('button');
    b.className='shoku-btn';b.dataset.shoku=s;
    b.innerHTML=`<span>${s}</span><span class="shoku-count">${cnt}</span>`;
    b.onclick=()=>pickShoku(s);list.appendChild(b);
  });
  renderGrid();
}

function pickShoku(s){
  selShoku=s||null;
  document.querySelectorAll('.shoku-btn').forEach(b=>b.classList.toggle('active',b.dataset.shoku===(s||'')));
  if(s)document.getElementById('f-shoku').value=s;
  renderGrid();
}
function setVtype(v){
  selVtype=v;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.vtype===v));
  renderGrid();
}
function renderGrid(){
  let list=T;
  if(selShoku)list=list.filter(t=>t.s===selShoku);
  if(selVtype!=='all')list=list.filter(t=>t.v===selVtype);
  document.getElementById('browse-title').textContent=selShoku||'全テンプレート';
  document.getElementById('browse-count').textContent=`${list.length} 件`;
  const grid=document.getElementById('template-grid');grid.innerHTML='';
  list.forEach(t=>{
    const idx=T.indexOf(t),isSel=sel.includes(idx),url=iurl(t.f),isReg=t.f.includes('_reg_');
    const card=document.createElement('div');card.className='tcard'+(isSel?' selected':'');
    card.onclick=()=>toggleSel(idx);
    card.innerHTML=`<div class="tcard-check">✓</div>
      <div class="tcard-img">
        ${url?`<img src="${url}" alt="${t.k}" loading="lazy" onerror="this.style.display='none'">`:''}
        <div class="img-placeholder" ${url?'style="display:none"':''}><span style="font-size:26px">${VI[t.v]||'🖼'}</span><span>${t.v}</span></div>
        <div class="color-dot" style="background:${CMAP[t.c]||'#999'}"></div>
        <div class="vtype-badge">${VI[t.v]} ${t.v}</div>
      </div>
      <div class="tcard-body">
        <div class="tcard-shoku">${t.s}</div>
        <div class="tcard-copy">${t.k}</div>
        <span class="cta-badge ${isReg?'cta-reg':'cta-app'}">${isReg?'今すぐ登録':'今すぐ応募'}</span>
      </div>`;
    grid.appendChild(card);
  });
}
function toggleSel(idx){
  if(sel.includes(idx)){sel=sel.filter(i=>i!==idx);}
  else{if(sel.length>=2)sel.shift();sel.push(idx);document.getElementById('f-shoku').value=T[idx].s;}
  updateBar();renderGrid();
}
function updateBar(){
  document.getElementById('sel-count').textContent=sel.length;
  document.getElementById('selection-bar').classList.toggle('visible',sel.length>0);
}
function clearSel(){sel=[];renderGrid();updateBar();}
function goForm(){
  if(!sel.length)return;
  const c=document.getElementById('sel-preview');c.innerHTML='';
  sel.forEach(i=>{const t=T[i],url=iurl(t.f);const d=document.createElement('div');d.className='sel-thumb';
    d.innerHTML=`<img src="${url||''}" alt="${t.k}" onerror="this.style.display='none'" ${!url?'style="display:none"':''}><div class="sel-thumb-label">${t.k}</div>`;c.appendChild(d);});
  showScreen(2);
}
function goBack(n){showScreen(n-1);}
function showScreen(n){
  document.querySelectorAll('.screen').forEach((s,i)=>s.classList.toggle('active',i+1===n));
  ['dot1','dot2','dot3'].forEach((id,i)=>{const d=document.getElementById(id);d.className='step-dot';
    if(i+1<n)d.classList.add('done');else if(i+1===n)d.classList.add('active');else d.classList.add('idle');});
  window.scrollTo(0,0);
}
function setCTA(v){fCTA=v;document.getElementById('cta-app').classList.toggle('active',v==='app');document.getElementById('cta-reg').classList.toggle('active',v==='reg');}

function makePrompt(t,shoku,copy,cta){
  const v=t?t.v:'実写',cl=t?t.c:'緑青';
  const refNote=t?`参照バナー：「${t.k}」(${t.s} / ${t.v})\n`:'';
  return `${refNote}Layout:\n${LAY[v]||LAY['実写']}\n\nColors:\n${PAL[cl]||PAL['緑青']}\n\nVisual type:\n${shoku}の${VIS[v]}\n\nMain visual:\n${shoku}の${VIS[v]}\n\nText/copy:\n${shoku}\n${copy}\nジョブメドレー\n\nTarget:\n${shoku}への転職・求職者（登場人物・職場環境は必ず${shoku}に関連するものに限定）\n\nCTA:\n${cta}\n\nStyle:\n${STY[v]}\n\nMood:\n${MOO[cl]||MOO['緑青']}\n\nMust keep:\n${MUS[v]}\n\nAvoid:\n${AVO[v]}\n\nPriority:\n1. メインコピー「${copy}」の視認性\n2. ${shoku}ターゲットへの的確な訴求\n3. ジョブメドレーブランドとの一貫性`;
}

function makeCombined(tA,tB,shoku,copy,cta){
  const refs=[tA,tB].filter(Boolean);
  const refLine=refs.length?`参照バナー：${refs.map(t=>`「${t.k}」(${t.v})`).join('、')}\n`:'';
  const vtype=refs.length?refs[0].v:'実写';
  const color=refs.length?refs[0].c:'緑青';
  return `${refLine}以下の2つのバナープロンプトを組み合わせ、新しい統一されたデザイン方向性で1:1の正方形画像を生成してください。 画像は2x2の4分割コンセプトボード形式で生成してください。
Layout:
${LAY[vtype]||LAY['実写']}
Colors:
${PAL[color]||PAL['緑青']}
Visual type:
${shoku}の${VIS[vtype]||VIS['実写']}
Main visual:
${shoku}の${VIS[vtype]||VIS['実写']}
Text/copy:
${shoku}
${copy}
ジョブメドレー
Target:
${shoku}への転職・求職者（登場人物・職場環境は必ず${shoku}に関連するものに限定）
CTA:
${cta}
Style:
${STY[vtype]||STY['実写']}
Mood:
${MOO[color]||MOO['緑青']}
Must keep:
${MUS[vtype]||MUS['実写']}
Avoid:
${AVO[vtype]||AVO['実写']}
Priority:
1. メインコピー「${copy}」の視認性
2. ${shoku}ターゲットへの的確な訴求
3. ジョブメドレーブランドとの一貫性`;
}

function highlight(text,keyClass='pk'){
  return text.replace(/^(Layout:|Colors:|Visual type:|Main visual:|Text\/copy:|Target:|CTA:|Style:|Mood:|Must keep:|Avoid:|Priority:|Output format:|Unified concept:|Design directions per quadrant:|Shared design rules.*:|Q[1-4] specifics.*:|参照バナー[：A-Z ]*)/gm,`<span class="${keyClass}">$1</span>`);
}

function generate(){
  const shoku=document.getElementById('f-shoku').value;
  const copy=document.getElementById('f-copy').value.trim();
  if(!shoku||!copy){alert('職種と訴求コピーを入力してください');return;}
  const cta=fCTA==='reg'?'今すぐ登録':'今すぐ応募';
  const tA=sel[0]!=null?T[sel[0]]:null;
  const tB=sel[1]!=null?T[sel[1]]:null;

  prompts.a=makePrompt(tA,shoku,copy,cta);
  prompts.b=makePrompt(tB,shoku,copy,cta);
  prompts.combined=makeCombined(tA,tB,shoku,copy,cta);

  // Show/hide B box based on whether 2nd ref was selected
  document.getElementById('box-b').style.display=tB?'':'none';

  // Render ref pills
  const rc=document.getElementById('prompt-refs');rc.innerHTML='';
  [tA,tB].filter(Boolean).forEach((t,i)=>{const url=iurl(t.f);const d=document.createElement('div');d.className='prompt-ref';
    d.innerHTML=`<img src="${url||''}" alt="${t.k}" onerror="this.style.display='none'" ${!url?'style="display:none"':''}><div><strong>${['A','B'][i]}. ${t.k}</strong><br>${t.s} · ${t.v}</div>`;rc.appendChild(d);});

  document.getElementById('out-a').innerHTML=highlight(prompts.a,'pk');
  document.getElementById('out-b').innerHTML=highlight(prompts.b,'pk-pink');
  document.getElementById('out-combined').innerHTML=highlight(prompts.combined,'pk-gold');

  ['a','b','combined'].forEach(k=>{const btn=document.querySelector(`[onclick="copyBox('${k}')"]`);if(btn){btn.textContent='📋 コピー';btn.classList.remove('copied');}});
  showScreen(3);
}

function copyBox(k){
  navigator.clipboard.writeText(prompts[k]||'').then(()=>{
    const btn=document.querySelector(`[onclick="copyBox('${k}')"]`);
    if(btn){btn.textContent='✓ コピーしました';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 コピー';btn.classList.remove('copied');},2000);}
  });
}
function copyAll(){
  const all=[prompts.a,prompts.b,prompts.combined].filter(Boolean).join('\n\n' + '═'.repeat(50) + '\n\n');
  navigator.clipboard.writeText(all).then(()=>{
    const btn=document.querySelector('.btn-copyall');btn.textContent='✓ すべてコピーしました';
    setTimeout(()=>btn.textContent='📋 すべてのプロンプトをまとめてコピー',2000);
  });
}
function restart(){sel=[];fCTA='app';document.getElementById('f-shoku').value='';document.getElementById('f-copy').value='';setCTA('app');updateBar();renderGrid();showScreen(1);}

document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>setVtype(c.dataset.vtype)));
init();
</script>
</body>
</html>
